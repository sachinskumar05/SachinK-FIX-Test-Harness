input_folder: "./input"
expected_folder: "./expected"

reports:
  # Tokens supported in report filenames: {scenario}, {timestamp}
  folder: "../../results"
  run_online_json: "{scenario}-{timestamp}-run-online-report.json"
  run_online_junit: "{scenario}-{timestamp}-run-online-junit.xml"
  run_offline_json: "{scenario}-{timestamp}-run-offline-report.json"
  run_offline_junit: "{scenario}-{timestamp}-run-offline-junit.xml"

io:
  mode: "online"

# Replayer-side FIX identities + initiator connect endpoints.
sessions:
  entry:
    sender_comp_id: "ENTRY"
    target_comp_id: "QFIX"
    connect_host: "127.0.0.1"
    connect_port: 11001
  exit:
    sender_comp_id: "EXIT"
    target_comp_id: "QFIX"
    connect_host: "127.0.0.1"
    connect_port: 11002

compare:
  excludeTimeLikeTags: true
  # Exclude standard tags but NOT tag 55 (Symbol) - we want to compare it
  defaultExcludeTags: [8, 9, 10, 34, 49, 52, 56, 122]

simulator:
  provider: "artio"
  enabled: true
  begin_string: "FIX.4.4"

  # Simulator-side sessions (acceptors)
  entry:
    listen_host: "127.0.0.1"
    listen_port: 11001
    local_comp_id: "QFIX"
    remote_comp_id: "ENTRY"

  exit:
    listen_host: "127.0.0.1"
    listen_port: 11002
    local_comp_id: "QFIX"
    remote_comp_id: "EXIT"

  routing:
    enabled_msg_types: ["D", "G", "F", "8", "3", "j"]
    drop_admin_messages: true
    fail_if_exit_not_logged_on: false
    artificial_delay_ms: 0
    max_queue_depth: 50000

  mutation:
    enabled: false
    strict_mode: false

  observability:
    log_inbound_outbound: true
    log_fix_payloads: false

  shutdown:
    graceful_timeout_ms: 5000

# NOTE:
# This scenario is designed to FAIL - it tests tag 55 (Symbol) mismatch detection
# Input symbols: AAPL, GOOGL, TSLA
# Expected symbols: MSFT, AMZN, NVDA
# All 3 messages should show tag 55 differences in the comparison report
